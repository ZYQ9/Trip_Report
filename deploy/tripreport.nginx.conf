server {
    listen 80;
    server_name _;  # Replace with your domain or IP

    # --- React static build ---
    root /opt/trip-report/frontend/dist;
    index index.html;

    # SPA fallback: any non-file route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API proxy to FastAPI ---
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # File upload size limit (for participant images)
        client_max_body_size 10M;
    }

    # --- Uploaded images served directly by Nginx ---
    location /uploads/ {
        alias /opt/trip-report/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
